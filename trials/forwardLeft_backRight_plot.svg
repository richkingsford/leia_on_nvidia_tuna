<circle cx="944" cy="426" r="27.0" fill="#0d5c63" fill-opacity="0.12" stroke="#0d5c63" stroke-width="1.4" />
<text x="994" y="430" class="panel-body">626.4 mm</text>
<text x="920" y="510" class="panel-title">Current Stats</text>
<text x="920" y="538" class="panel-muted">usable trials</text>
<text x="1152" y="538" text-anchor="end" class="panel-body">4</text>
